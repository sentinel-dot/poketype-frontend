<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- red rounded background like header icon -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e03a3a"/>
      <stop offset="100%" stop-color="#b01010"/>
    </linearGradient>
  </defs>
  <!-- pokeball circle outline -->
  <circle cx="16" cy="16" r="10" stroke="white" stroke-width="1.8" fill="none"/>
  <!-- horizontal divider (left side) -->
  <line x1="6" y1="16" x2="11.5" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- horizontal divider (right side) -->
  <line x1="20.5" y1="16" x2="26" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- center button -->
  <circle cx="16" cy="16" r="3" fill="white"/>
</svg>
